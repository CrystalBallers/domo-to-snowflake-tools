[tool:pytest]
# Pytest configuration file for Domo to Snowflake Migration Tools

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10
    --cov=tools
    --cov-report=html:tests/coverage_html
    --cov-report=term-missing
    --cov-report=xml:tests/coverage.xml
    --cov-fail-under=80

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test interactions)
    slow: Slow tests (may take several seconds)
    api: Tests that require API connections
    database: Tests that require database connections
    sheets: Tests that require Google Sheets access
    cli: Tests for command-line interface
    maintenance: Tests for maintenance scripts
    migration: Tests for data migration functionality
    comparison: Tests for data comparison functionality

# Test filtering
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 3.8

# Test timeout (in seconds)
timeout = 300

# Disable cacheprov plugin
cache_dir = tests/.pytest_cache